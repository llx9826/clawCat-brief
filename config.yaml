# AI/CV Weekly 配置文件
# 复制为 config.local.yaml 并填入真实值

# LLM 配置
llm:
  provider: bailian
  api_key: ${BAILIAN_API_KEY}  # 从环境变量读取，或在此填入
  base_url: https://coding.dashscope.aliyuncs.com/v1
  model: kimi-k2.5
  timeout: 180
  max_retries: 2
  temperature: 0.7

# 代理配置
proxy:
  enabled: false
  http: http://127.0.0.1:7890
  https: http://127.0.0.1:7890

# GitHub 配置
github:
  token: ${GITHUB_TOKEN}  # 从环境变量读取，或在此填入

# 数据源配置
sources:
  enabled:
    - jiqizhixin
    - 36kr
    - github
    - arxiv
    - hackernews
    - paperswithcode
    - reddit
    - devto
    - zhihu
    - juejin
  # 可选的高级源（需要 API Key）
  # - newsapi
  # - reddit_api

# 邮件配置
email:
  smtp_server: smtp.163.com
  smtp_port: 465
  use_ssl: true
  sender_email: ${EMAIL_SENDER}
  sender_password: ${EMAIL_PASSWORD}
  receiver_email: ${EMAIL_RECEIVER}

# 周报生成配置
weekly:
  max_items: 35
  time_range_days: 7
  min_cv_ratio: 0.5  # CV/OCR 内容最小占比

# 日志配置
logging:
  level: INFO
  file: logs/weekly.log
  max_bytes: 10485760  # 10MB
  backup_count: 5
