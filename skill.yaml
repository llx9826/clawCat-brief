name: lunaclaw-brief
version: 3.0.0
description: |
  LunaClaw Brief — Pluggable AI-powered report engine.
  Supports tech weekly/daily and finance weekly/daily presets.
  Features plugin registry, 8-stage pipeline, and beautiful HTML/PDF output.

triggers:
  - "生成周报"
  - "生成日报"
  - "生成金融周报"
  - "生成金融日报"
  - "generate weekly report"
  - "generate daily brief"
  - "generate finance report"

config:
  preset:
    type: string
    default: "ai_cv_weekly"
    description: "Preset: ai_cv_weekly | ai_daily | finance_weekly | finance_daily"
  hint:
    type: string
    default: ""
    description: "Extra hint for LLM editor"
  send_email:
    type: boolean
    default: false
    description: "Send report via email after generation"

outputs:
  - name: html_path
    type: string
    description: "Generated HTML report path"
  - name: md_path
    type: string
    description: "Generated Markdown file path"
  - name: pdf_path
    type: string
    description: "Generated PDF path (requires WeasyPrint)"
  - name: issue_number
    type: integer
    description: "Auto-incremented issue number"

entry: run.py
function: generate_report

dependencies:
  python: ">=3.10"
  packages:
    - aiohttp
    - requests
    - jinja2
    - pyyaml
